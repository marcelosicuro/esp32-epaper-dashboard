substitutions:
  device_name: painel-pessoal
  friendly_name: "Painel Pessoal"

  # --- Localização para o clima (Open-Meteo, grátis, sem API key) ---
  latitude: "-23.5505"   # São Paulo — ajuste para sua cidade
  longitude: "-46.6333"
  timezone: "America/Sao_Paulo"

  # --- Pinos SPI (Waveshare 7.5" V2 + ESP32-C3) ---
  # Consulte o README se precisar ajustar para sua fiação
  spi_clk:    GPIO6
  spi_mosi:   GPIO7
  epaper_cs:  GPIO2
  epaper_dc:  GPIO4
  epaper_rst: GPIO5
  epaper_busy: GPIO3

# ---------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Hotspot de fallback — permite acessar pelo IP 192.168.4.1 se a rede cair
  ap:
    ssid: "Painel Setup"
    password: !secret ap_password

captive_portal:

logger:

# OTA — permite atualizar o firmware pelo Wi-Fi sem cabo
ota:
  - platform: esphome
    password: !secret ota_password

# Web server — acesse http://<IP> para ver status dos sensores
web_server:
  port: 80

# API ESPHome (opcional — mantida para facilitar debug no ESPHome Dashboard)
api:
  encryption:
    key: !secret api_key

# ---------------------------------------------------------------------------
# Horário via NTP (sem HA)
time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - pool.ntp.org
      - 1.br.pool.ntp.org
      - 2.br.pool.ntp.org
    on_time_sync:
      then:
        - component.update: epaper_display

# ---------------------------------------------------------------------------
# HTTP — busca dados do clima diretamente da internet
http_request:
  useragent: esphome/painel-pessoal
  timeout: 15s

# ---------------------------------------------------------------------------
# Variáveis globais que guardam os dados do clima entre atualizações
globals:
  - id: g_temp
    type: float
    restore_value: false
    initial_value: '-99.0'

  - id: g_feels_like
    type: float
    restore_value: false
    initial_value: '-99.0'

  - id: g_humidity
    type: int
    restore_value: false
    initial_value: '0'

  - id: g_wind_kmh
    type: float
    restore_value: false
    initial_value: '0.0'

  - id: g_weather_code
    type: int
    restore_value: false
    initial_value: '-1'

  - id: g_weather_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: g_last_update_h
    type: int
    restore_value: false
    initial_value: '-1'

  - id: g_last_update_m
    type: int
    restore_value: false
    initial_value: '-1'

# ---------------------------------------------------------------------------
# Busca o clima a cada 20 minutos
interval:
  - interval: 20min
    then:
      - script.execute: fetch_weather

# Dispara a primeira busca 10 segundos após o boot
on_boot:
  priority: -100
  then:
    - delay: 10s
    - script.execute: fetch_weather

# ---------------------------------------------------------------------------
script:
  - id: fetch_weather
    mode: single
    then:
      - http_request.get:
          url: !lambda |-
            return "https://api.open-meteo.com/v1/forecast"
                   "?latitude=${latitude}"
                   "&longitude=${longitude}"
                   "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m"
                   "&wind_speed_unit=kmh"
                   "&timezone=auto";
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) {
                    ESP_LOGW("clima", "HTTP %d", response->status_code);
                    return;
                  }
                  bool ok = json::parse_json(body, [](JsonObject root) -> bool {
                    auto cur = root["current"];
                    if (cur.isNull()) return false;
                    id(g_temp)         = cur["temperature_2m"].as<float>();
                    id(g_feels_like)   = cur["apparent_temperature"].as<float>();
                    id(g_humidity)     = cur["relative_humidity_2m"].as<int>();
                    id(g_wind_kmh)     = cur["wind_speed_10m"].as<float>();
                    id(g_weather_code) = cur["weather_code"].as<int>();
                    id(g_weather_ok)   = true;
                    // registra horário da última atualização
                    auto t = id(sntp_time).now();
                    id(g_last_update_h) = t.hour;
                    id(g_last_update_m) = t.minute;
                    return true;
                  });
                  if (ok) {
                    id(epaper_display).update();
                  } else {
                    ESP_LOGW("clima", "Falha ao parsear JSON");
                  }

# ---------------------------------------------------------------------------
# Fontes — baixe as TTF e coloque na pasta ./fonts/  (veja README)
font:
  - file: "fonts/Roboto-Bold.ttf"
    id: font_clock
    size: 80
    glyphs: "0123456789:"

  - file: "fonts/Roboto-Regular.ttf"
    id: font_date
    size: 24
    glyphs: &glyphs_pt >-
      ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
      0123456789 .,:/°-çãõáéíóúâêîôûàèìòù

  - file: "fonts/Roboto-Bold.ttf"
    id: font_temp
    size: 52
    glyphs: "0123456789.,-°C"

  - file: "fonts/Roboto-Regular.ttf"
    id: font_label
    size: 22
    glyphs: *glyphs_pt

  - file: "fonts/Roboto-Light.ttf"
    id: font_small
    size: 18
    glyphs: *glyphs_pt

# ---------------------------------------------------------------------------
spi:
  clk_pin: ${spi_clk}
  mosi_pin: ${spi_mosi}

# ---------------------------------------------------------------------------
display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin:   ${epaper_cs}
    dc_pin:   ${epaper_dc}
    busy_pin: ${epaper_busy}
    reset_pin: ${epaper_rst}
    model: 7.50inV2
    update_interval: 1min   # redesenha o relógio a cada minuto
    rotation: 0°
    lambda: |-
      // ── Dimensões ────────────────────────────────────────
      const int W = 800, H = 480;
      const int PAD = 24;

      // ── Hora ─────────────────────────────────────────────
      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        it.printf(W/2, H/2, id(font_label), TextAlign::CENTER, "Aguardando horário...");
        return;
      }

      // Hora grande (lado esquerdo)
      it.strftime(PAD, 60, id(font_clock), TextAlign::TOP_LEFT, "%H:%M", now);

      // Data por extenso
      const char* dias[] = {"Dom","Seg","Ter","Qua","Qui","Sex","Sáb"};
      const char* meses[] = {
        "jan","fev","mar","abr","mai","jun",
        "jul","ago","set","out","nov","dez"
      };
      char data_str[48];
      snprintf(data_str, sizeof(data_str), "%s, %02d de %s de %04d",
               dias[now.day_of_week], now.day_of_month,
               meses[now.month - 1], now.year);
      it.printf(PAD, 160, id(font_date), TextAlign::TOP_LEFT, "%s", data_str);

      // Linha divisória vertical
      it.line(W/2 - 20, PAD, W/2 - 20, H - PAD);

      // ── Clima (lado direito) ──────────────────────────────
      const int CX = W/2 + 10;  // margem esquerda do bloco de clima

      if (!id(g_weather_ok)) {
        it.printf(CX + (W/2)/2, H/2, id(font_label), TextAlign::CENTER,
                  "Buscando clima...");
      } else {
        // Ícone textual do tempo (WMO weather codes → PT)
        auto wmo_descricao = [](int code) -> const char* {
          if (code == 0)                          return "Céu limpo";
          if (code <= 3)                          return "Nublado";
          if (code == 45 || code == 48)           return "Nevoeiro";
          if (code >= 51 && code <= 55)           return "Garoa";
          if (code >= 61 && code <= 65)           return "Chuva";
          if (code >= 71 && code <= 77)           return "Neve";
          if (code >= 80 && code <= 82)           return "Pancadas";
          if (code == 95)                         return "Tempestade";
          if (code == 96 || code == 99)           return "Granizo";
          return "—";
        };

        int cy = PAD + 10;

        // Condição
        it.printf(CX, cy, id(font_label), TextAlign::TOP_LEFT,
                  "%s", wmo_descricao(id(g_weather_code)));
        cy += 36;

        // Temperatura grande
        it.printf(CX, cy, id(font_temp), TextAlign::TOP_LEFT,
                  "%.1f°C", id(g_temp));
        cy += 72;

        // Grade de detalhes
        const int COL2 = CX + 180;
        it.printf(CX,   cy, id(font_label), TextAlign::TOP_LEFT, "Sensação");
        it.printf(COL2, cy, id(font_label), TextAlign::TOP_LEFT,
                  "%.1f°C", id(g_feels_like));
        cy += 34;

        it.printf(CX,   cy, id(font_label), TextAlign::TOP_LEFT, "Umidade");
        it.printf(COL2, cy, id(font_label), TextAlign::TOP_LEFT,
                  "%d%%", id(g_humidity));
        cy += 34;

        it.printf(CX,   cy, id(font_label), TextAlign::TOP_LEFT, "Vento");
        it.printf(COL2, cy, id(font_label), TextAlign::TOP_LEFT,
                  "%.0f km/h", id(g_wind_kmh));
        cy += 60;

        // Linha separadora
        it.line(CX, cy, W - PAD, cy);
        cy += 12;

        // Horário da última atualização
        if (id(g_last_update_h) >= 0) {
          it.printf(CX, cy, id(font_small), TextAlign::TOP_LEFT,
                    "Atualizado às %02d:%02d",
                    id(g_last_update_h), id(g_last_update_m));
        }
      }

      // ── Rodapé ────────────────────────────────────────────
      it.line(PAD, H - 46, W - PAD, H - 46);
      it.printf(PAD, H - 40, id(font_small), TextAlign::TOP_LEFT,
                "${friendly_name}  ·  v1.0");
