substitutions:
  device_name: painel-pessoal
  friendly_name: "Painel Pessoal"
  latitude:  "-26.3044"
  longitude: "-48.8487"
  timezone:  "America/Sao_Paulo"
  spi_clk:     GPIO8
  spi_mosi:    GPIO10
  epaper_cs:   GPIO3
  epaper_dc:   GPIO5
  epaper_rst:  GPIO2
  epaper_busy: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - delay: 12s
      - script.execute: fetch_all

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_BROWNOUT_DET: "n"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Painel Setup"
    password: !secret ap_password

captive_portal:
logger:
  level: DEBUG
  logs:
    http_request: DEBUG

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - pool.ntp.org
      - 1.br.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "NTP sincronizado"

interval:
  - interval: 20min
    then:
      - script.execute: fetch_all

http_request:
  useragent: esphome/painel-pessoal
  timeout: 15s
  verify_ssl: false
  buffer_size_rx: 16384
  buffer_size_tx: 512

globals:
  # Clima atual
  - id: g_temp
    type: float
    restore_value: false
    initial_value: '-99.0'
  - id: g_feels_like
    type: float
    restore_value: false
    initial_value: '-99.0'
  - id: g_humidity
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_wind_kmh
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_weather_code
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_weather_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Previsão 5 dias
  - id: g_fc_code_0
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_0
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_0
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_1
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_1
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_1
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_2
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_2
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_2
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_3
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_3
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_3
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_4
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_4
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_4
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_forecast_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Cotações
  - id: g_usd_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_btc_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_rates_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Horário da última atualização
  - id: g_upd_h
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_upd_m
    type: int
    restore_value: false
    initial_value: '-1'

# ---------------------------------------------------------------------------
script:
  - id: fetch_all
    mode: single
    then:
      - script.execute: fetch_weather
      - script.wait:   fetch_weather
      - script.execute: fetch_rates
      - script.wait:   fetch_rates
      - component.update: epaper_display

  - id: fetch_weather
    mode: restart
    then:
      - logger.log: "fetch_weather: iniciando..."
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&wind_speed_unit=kmh&timezone=auto&forecast_days=6"
          headers:
            Accept-Encoding: identity
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto cur = root["current"];
                    if (!cur.isNull()) {
                      id(g_temp)         = cur["temperature_2m"].as<float>();
                      id(g_feels_like)   = cur["apparent_temperature"].as<float>();
                      id(g_humidity)     = cur["relative_humidity_2m"].as<int>();
                      id(g_wind_kmh)     = cur["wind_speed_10m"].as<float>();
                      id(g_weather_code) = cur["weather_code"].as<int>();
                      id(g_weather_ok)   = true;
                      auto t = id(sntp_time).now();
                      id(g_upd_h) = t.hour; id(g_upd_m) = t.minute;
                    }
                    auto daily = root["daily"];
                    if (!daily.isNull()) {
                      auto codes = daily["weather_code"].as<JsonArray>();
                      auto maxs  = daily["temperature_2m_max"].as<JsonArray>();
                      auto mins  = daily["temperature_2m_min"].as<JsonArray>();
                      id(g_fc_code_0) = codes[1].as<int>(); id(g_fc_max_0) = maxs[1].as<float>(); id(g_fc_min_0) = mins[1].as<float>();
                      id(g_fc_code_1) = codes[2].as<int>(); id(g_fc_max_1) = maxs[2].as<float>(); id(g_fc_min_1) = mins[2].as<float>();
                      id(g_fc_code_2) = codes[3].as<int>(); id(g_fc_max_2) = maxs[3].as<float>(); id(g_fc_min_2) = mins[3].as<float>();
                      id(g_fc_code_3) = codes[4].as<int>(); id(g_fc_max_3) = maxs[4].as<float>(); id(g_fc_min_3) = mins[4].as<float>();
                      id(g_fc_code_4) = codes[5].as<int>(); id(g_fc_max_4) = maxs[5].as<float>(); id(g_fc_min_4) = mins[5].as<float>();
                      id(g_forecast_ok) = true;
                    }
                    return true;
                  });

  - id: fetch_rates
    mode: single
    then:
      - http_request.get:
          url: "https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL"
          headers:
            Accept-Encoding: identity
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto usd = root["USDBRL"];
                    auto btc = root["BTCBRL"];
                    if (!usd.isNull()) id(g_usd_brl) = atof(usd["bid"].as<const char*>());
                    if (!btc.isNull()) id(g_btc_brl) = atof(btc["bid"].as<const char*>());
                    id(g_rates_ok) = true;
                    return true;
                  });

# ---------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto@700"
    id: font_clock
    size: 78
    glyphs: "0123456789:"



  - file: "gfonts://Roboto@700"
    id: font_temp_big
    size: 66
    glyphs: "0123456789.,°C"

  - file: "gfonts://Roboto@700"
    id: font_rates_big
    size: 48
    glyphs: "0123456789.,$ BTC"

  - file: "gfonts://Roboto"
    id: font_body
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "gfonts://Roboto@700"
    id: font_body_bold
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "gfonts://Roboto"
    id: font_small
    size: 16
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%-"

  - file: "gfonts://Roboto@300"
    id: font_date
    size: 26
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

# ---------------------------------------------------------------------------
spi:
  clk_pin:  ${spi_clk}
  mosi_pin: ${spi_mosi}

# ---------------------------------------------------------------------------
display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin:    ${epaper_cs}
    dc_pin:    ${epaper_dc}
    busy_pin:
      number: ${epaper_busy}
      inverted: true
    reset_pin: ${epaper_rst}
    model: 7.50inv2
    update_interval: 60s
    rotation: 0°
    lambda: |-
      const int W = 800, H = 480, PAD = 20;

      // WMO → tipo de ícone
      auto wmo_type = [](int c) -> int {
        if (c == 0)              return 0;  // sunny
        if (c <= 3)              return 1;  // cloudy
        if (c == 45 || c == 48) return 1;  // fog
        if (c >= 51 && c <= 55) return 1;  // drizzle
        if (c >= 61 && c <= 65) return 2;  // rain
        if (c >= 71 && c <= 77) return 3;  // snow
        if (c >= 80 && c <= 82) return 2;  // rainy
        if (c >= 95)            return 4;  // thunder
        return 1;
      };

      // Desenha ícone usando shapes (círculos, linhas, retângulos)
      auto draw_icon = [&](int x, int y, int type, int size) {
        int r = size / 2;
        if (type == 0) {
          // Sunny: círculo com raios
          it.filled_circle(x, y, r);
          it.line(x - r - 8, y, x - r - 3, y);
          it.line(x + r + 3, y, x + r + 8, y);
          it.line(x, y - r - 8, x, y - r - 3);
          it.line(x, y + r + 3, x, y + r + 8);
        } else if (type == 1) {
          // Cloudy: dois círculos sobrepostos (nuvem)
          it.filled_circle(x - 6, y + 4, r - 2);
          it.filled_circle(x + 6, y + 4, r - 2);
          it.filled_rectangle(x - r, y + 2, r * 2, r - 2);
        } else if (type == 2) {
          // Rainy: nuvem + gotas
          it.filled_circle(x - 6, y, r - 3);
          it.filled_circle(x + 6, y, r - 3);
          it.filled_rectangle(x - r, y - 1, r * 2, r - 3);
          it.line(x - 8, y + r + 2, x - 6, y + r + 8);
          it.line(x, y + r + 2, x + 2, y + r + 8);
          it.line(x + 8, y + r + 2, x + 10, y + r + 8);
        } else if (type == 3) {
          // Snow: nuvem + flocos (*)
          it.filled_circle(x - 6, y, r - 3);
          it.filled_circle(x + 6, y, r - 3);
          it.filled_rectangle(x - r, y - 1, r * 2, r - 3);
          it.printf(x - 6, y + r + 5, id(font_small), TextAlign::CENTER, "*");
          it.printf(x, y + r + 5, id(font_small), TextAlign::CENTER, "*");
          it.printf(x + 6, y + r + 5, id(font_small), TextAlign::CENTER, "*");
        } else if (type == 4) {
          // Thunder: nuvem + raio em zig-zag
          it.filled_circle(x - 6, y, r - 3);
          it.filled_circle(x + 6, y, r - 3);
          it.filled_rectangle(x - r, y - 1, r * 2, r - 3);
          it.line(x, y + r, x - 3, y + r + 6);
          it.line(x - 3, y + r + 6, x + 3, y + r + 10);
          it.line(x + 3, y + r + 10, x, y + r + 14);
        }
      };

      auto wmo_desc = [](int c) -> const char* {
        if (c == 0)              return "Ceu limpo";
        if (c <= 3)              return "Nublado";
        if (c == 45 || c == 48) return "Nevoeiro";
        if (c >= 51 && c <= 55) return "Garoa";
        if (c >= 61 && c <= 65) return "Chuva";
        if (c >= 71 && c <= 77) return "Neve";
        if (c >= 80 && c <= 82) return "Pancadas";
        if (c >= 95)            return "Tempestade";
        return "Variavel";
      };

      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        it.printf(W/2, H/2, id(font_body), TextAlign::CENTER, "Aguardando NTP...");
        return;
      }

      // ══════════════════════════════════════════════════════════════════
      // TOPO: Data/Hora
      // ══════════════════════════════════════════════════════════════════
      it.strftime(PAD, 15, id(font_clock), TextAlign::TOP_LEFT, "%H:%M", now);

      const char* dias[]  = {"Dom","Seg","Ter","Qua","Qui","Sex","Sab"};
      const char* meses[] = {"jan","fev","mar","abr","mai","jun",
                              "jul","ago","set","out","nov","dez"};
      char data_buf[48];
      snprintf(data_buf, sizeof(data_buf), "%s, %02d de %s de %04d",
               dias[now.day_of_week - 1], now.day_of_month,
               meses[now.month - 1], now.year);
      it.printf(PAD, 108, id(font_date), TextAlign::TOP_LEFT, "%s", data_buf);

      it.line(0, 155, W, 155);

      // ══════════════════════════════════════════════════════════════════
      // MEIO: ESQUERDA (clima atual) + DIREITA (cotações + previsão)
      // ══════════════════════════════════════════════════════════════════

      // ESQUERDA: Clima atual com emoji grande
      const int LX = PAD + 30;
      const int LY = 170;

      if (!id(g_weather_ok)) {
        it.printf(LX, LY, id(font_body), TextAlign::TOP_LEFT, "Buscando clima...");
      } else {
        // Desenha ícone do clima (formas geométricas)
        draw_icon(LX + 28, LY + 20, wmo_type(id(g_weather_code)), 32);

        // Temperatura grande
        it.printf(LX + 90, LY + 5, id(font_temp_big), TextAlign::TOP_LEFT,
                  "%.0f°", id(g_temp));

        // Descrição + detalhes
        const int DLY = LY + 75;
        const int DLS = 24;
        it.printf(LX, DLY, id(font_body), TextAlign::TOP_LEFT,
                  "%s", wmo_desc(id(g_weather_code)));
        it.printf(LX, DLY + DLS, id(font_small), TextAlign::TOP_LEFT,
                  "Sensacao: %.0f° | Umidade: %d%%", id(g_feels_like), id(g_humidity));
        it.printf(LX, DLY + DLS*2, id(font_small), TextAlign::TOP_LEFT,
                  "Vento: %.0f km/h", id(g_wind_kmh));
      }

      // DIREITA: Cotações (grande) + Previsão (compacta)
      const int RX = 440;

      // Cotações grandes
      if (id(g_rates_ok)) {
        char buf_usd[32];
        snprintf(buf_usd, sizeof(buf_usd), "$ %.2f", id(g_usd_brl));
        it.printf(RX, LY, id(font_rates_big), TextAlign::TOP_LEFT, "%s", buf_usd);

        char buf_btc[32];
        snprintf(buf_btc, sizeof(buf_btc), "BTC %.0f", id(g_btc_brl));
        it.printf(RX, LY + 60, id(font_rates_big), TextAlign::TOP_LEFT, "%s", buf_btc);
      }

      // Previsão 5 dias (compacta, 2 linhas)
      if (id(g_forecast_ok)) {
        it.printf(RX, LY + 130, id(font_body_bold), TextAlign::TOP_LEFT, "Proximos 5 dias");

        struct Fc { int code; float max_t; float min_t; } fcs[] = {
          {id(g_fc_code_0), id(g_fc_max_0), id(g_fc_min_0)},
          {id(g_fc_code_1), id(g_fc_max_1), id(g_fc_min_1)},
          {id(g_fc_code_2), id(g_fc_max_2), id(g_fc_min_2)},
          {id(g_fc_code_3), id(g_fc_max_3), id(g_fc_min_3)},
          {id(g_fc_code_4), id(g_fc_max_4), id(g_fc_min_4)}
        };
        const char* labels[] = {"Ama", "2d", "3d", "4d", "5d"};

        // Linha 1: ícones (menores para previsão)
        int fx = RX + 20;
        for (int i = 0; i < 5; i++) {
          draw_icon(fx, LY + 165, wmo_type(fcs[i].code), 20);
          fx += 70;
        }

        // Linha 2: min/max
        fx = RX;
        for (int i = 0; i < 5; i++) {
          char fc_temps[16];
          snprintf(fc_temps, sizeof(fc_temps), "%.0f/%.0f", fcs[i].max_t, fcs[i].min_t);
          it.printf(fx, LY + 220, id(font_small), TextAlign::TOP_CENTER, "%s", fc_temps);
          fx += 70;
        }
      }

      // ══════════════════════════════════════════════════════════════════
      // RODAPÉ: Última atualização
      // ══════════════════════════════════════════════════════════════════
      if (id(g_upd_h) >= 0) {
        it.printf(W - PAD, H - 15, id(font_small), TextAlign::BOTTOM_RIGHT,
                  "atualizado as %02d:%02d", id(g_upd_h), id(g_upd_m));
      }
