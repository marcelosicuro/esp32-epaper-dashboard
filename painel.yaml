substitutions:
  device_name: painel-pessoal
  friendly_name: "Painel Pessoal"
  latitude:  "-26.3044"
  longitude: "-48.8487"
  timezone:  "America/Sao_Paulo"
  spi_clk:     GPIO8
  spi_mosi:    GPIO10
  epaper_cs:   GPIO3
  epaper_dc:   GPIO5
  epaper_rst:  GPIO2
  epaper_busy: GPIO4

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - delay: 12s
      - script.execute: fetch_all

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_BROWNOUT_DET: "n"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Painel Setup"
    password: !secret ap_password

captive_portal:
logger:
  level: DEBUG
  logs:
    http_request: DEBUG

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

sensor:
  - platform: internal_temperature
    id: cpu_temp_sensor
    name: "CPU Temperature"
    update_interval: 60s

  - platform: wifi_signal
    id: wifi_rssi_sensor
    name: "WiFi RSSI"
    update_interval: 60s

  - platform: uptime
    id: uptime_sensor
    name: "Uptime"
    unit_of_measurement: "s"
    update_interval: 60s

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - pool.ntp.org
      - 1.br.pool.ntp.org
    on_time_sync:
      then:
        - logger.log: "NTP sincronizado"

interval:
  - interval: 20min
    then:
      - script.execute: fetch_all

http_request:
  useragent: esphome/painel-pessoal
  timeout: 15s
  verify_ssl: false
  buffer_size_rx: 16384
  buffer_size_tx: 512

globals:
  - id: g_usd_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_btc_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_rates_ok
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: g_upd_h
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_upd_m
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_temp
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_humidity
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_weather_code
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_weather_ok
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: g_fc_code
    type: int[5]
    restore_value: false
    initial_value: "{-1,-1,-1,-1,-1}"
  - id: g_fc_tmax
    type: float[5]
    restore_value: false
    initial_value: "{0,0,0,0,0}"
  - id: g_fc_tmin
    type: float[5]
    restore_value: false
    initial_value: "{0,0,0,0,0}"
  - id: g_fc_ok
    type: bool
    restore_value: false
    initial_value: 'false'

script:
  - id: fetch_all
    mode: single
    then:
      - script.execute: fetch_weather
      - script.execute: fetch_rates
      - script.wait:   fetch_weather
      - script.wait:   fetch_rates
      - component.update: epaper_display

  - id: fetch_weather
    mode: single
    then:
      - http_request.get:
          url: "https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&forecast_days=6&timezone=auto"
          headers:
            Accept-Encoding: identity
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto cur = root["current"];
                    if (cur.isNull()) return false;
                    id(g_temp)         = cur["temperature_2m"].as<float>();
                    id(g_humidity)     = cur["relative_humidity_2m"].as<int>();
                    id(g_weather_code) = cur["weather_code"].as<int>();
                    id(g_weather_ok)   = true;
                    ESP_LOGI("clima", "OK: code=%d temp=%.1f umid=%d", id(g_weather_code), id(g_temp), id(g_humidity));
                    auto daily = root["daily"];
                    if (!daily.isNull()) {
                      JsonArray codes = daily["weather_code"].as<JsonArray>();
                      JsonArray tmax  = daily["temperature_2m_max"].as<JsonArray>();
                      JsonArray tmin  = daily["temperature_2m_min"].as<JsonArray>();
                      for (int i = 0; i < 5; i++) {
                        id(g_fc_code)[i] = codes[i+1].as<int>();
                        id(g_fc_tmax)[i] = tmax[i+1].as<float>();
                        id(g_fc_tmin)[i] = tmin[i+1].as<float>();
                      }
                      id(g_fc_ok) = true;
                    }
                    return true;
                  });

  - id: fetch_rates
    mode: single
    then:
      - http_request.get:
          url: "https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL"
          headers:
            Accept-Encoding: identity
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto usd = root["USDBRL"];
                    auto btc = root["BTCBRL"];
                    if (!usd.isNull()) id(g_usd_brl) = atof(usd["bid"].as<const char*>());
                    if (!btc.isNull()) id(g_btc_brl) = atof(btc["bid"].as<const char*>());
                    id(g_rates_ok) = true;
                    auto t = id(sntp_time).now();
                    id(g_upd_h) = t.hour; id(g_upd_m) = t.minute;
                    return true;
                  });

font:
  - file: "gfonts://Roboto@700"
    id: font_clock
    size: 78
    glyphs: "0123456789:"

  - file: "gfonts://Roboto@700"
    id: font_calendar_day
    size: 34
    glyphs: "0123456789"

  - file: "gfonts://Roboto"
    id: font_calendar_label
    size: 18
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "gfonts://Roboto@700"
    id: font_rates_big
    size: 48
    glyphs: "0123456789., C°"

  - file: "gfonts://Roboto@700"
    id: font_rates_small
    size: 36
    glyphs: "0123456789.,"

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_currency_icon
    size: 36
    glyphs:
      - "\U000F0813"  # bitcoin
      - "\U000F01C1"  # currency-usd
      - "\U000F0B85"  # currency-brl

  - file: "gfonts://Roboto"
    id: font_body
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "gfonts://Roboto@700"
    id: font_body_bold
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "gfonts://Roboto"
    id: font_small
    size: 16
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%-àáéíóúâêîôûãõç"

  - file: "gfonts://Roboto@700"
    id: font_date
    size: 26
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:/°%$-_()çãõáéíóúâêîôûàèìòùäëïöü"

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_weather_icon_small
    size: 36
    glyphs:
      - "\U000F0590"  # weather-cloudy
      - "\U000F0591"  # weather-fog
      - "\U000F0593"  # weather-lightning
      - "\U000F0595"  # weather-partly-cloudy
      - "\U000F0596"  # weather-pouring
      - "\U000F0597"  # weather-rainy
      - "\U000F0598"  # weather-snowy
      - "\U000F0599"  # weather-sunny
      - "\U000F067E"  # weather-lightning-rainy
      - "\U000F067F"  # weather-snowy-rainy

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_device_icon
    size: 24
    glyphs:
      - "\U000F050F"  # thermometer (CPU temp)
      - "\U000F05A9"  # wifi
      - "\U000F0238"  # timer (uptime)

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_weather_icon
    size: 72
    glyphs:
      - "\U000F0590"  # weather-cloudy
      - "\U000F0591"  # weather-fog
      - "\U000F0593"  # weather-lightning
      - "\U000F0595"  # weather-partly-cloudy
      - "\U000F0596"  # weather-pouring
      - "\U000F0597"  # weather-rainy
      - "\U000F0598"  # weather-snowy
      - "\U000F0599"  # weather-sunny
      - "\U000F067E"  # weather-lightning-rainy
      - "\U000F067F"  # weather-snowy-rainy

spi:
  clk_pin:  ${spi_clk}
  mosi_pin: ${spi_mosi}

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin:    ${epaper_cs}
    dc_pin:    ${epaper_dc}
    busy_pin:
      number: ${epaper_busy}
      inverted: true
    reset_pin: ${epaper_rst}
    model: 7.50inv2
    update_interval: 60s
    rotation: 0°
    lambda: |-
      const int W = 800, H = 480, PAD = 20;

      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        it.printf(W/2, H/2, id(font_body), TextAlign::CENTER, "Aguardando NTP...");
        return;
      }

      // ══════════════════════════════════════════════════════════════════
      // TOPO: 3 colunas — Dispositivo | Relógio | Cotações
      // ══════════════════════════════════════════════════════════════════

      // Divisórias verticais do topo
      it.line(267, 0, 267, 155);
      it.line(533, 0, 533, 155);

      // ── ESQUERDA (0–267): info do dispositivo ──────────────────────
      {
        const int DX_IC = PAD;
        const int DX_TX = PAD + 32;
        const int DY1 = 18;
        const int DY2 = 56;
        const int DY3 = 94;

        // CPU temp
        it.printf(DX_IC, DY1, id(font_device_icon), TextAlign::TOP_LEFT, "\U000F050F");
        if (!isnan(id(cpu_temp_sensor).state))
          it.printf(DX_TX, DY1 + 1, id(font_body), TextAlign::TOP_LEFT,
                    "%.0f°C CPU", id(cpu_temp_sensor).state);

        // WiFi RSSI
        it.printf(DX_IC, DY2, id(font_device_icon), TextAlign::TOP_LEFT, "\U000F05A9");
        if (!isnan(id(wifi_rssi_sensor).state))
          it.printf(DX_TX, DY2 + 1, id(font_body), TextAlign::TOP_LEFT,
                    "%.0f dBm", id(wifi_rssi_sensor).state);

        // Uptime
        it.printf(DX_IC, DY3, id(font_device_icon), TextAlign::TOP_LEFT, "\U000F0238");
        if (!isnan(id(uptime_sensor).state)) {
          int ups = (int)id(uptime_sensor).state;
          int upd = ups / 86400;
          int uph = (ups % 86400) / 3600;
          int upm = (ups % 3600) / 60;
          char upbuf[16];
          if (upd > 0)      snprintf(upbuf, sizeof(upbuf), "%dd %dh", upd, uph);
          else if (uph > 0) snprintf(upbuf, sizeof(upbuf), "%dh %dm", uph, upm);
          else               snprintf(upbuf, sizeof(upbuf), "%dm", upm);
          it.printf(DX_TX, DY3 + 1, id(font_body), TextAlign::TOP_LEFT, "%s online", upbuf);
        }
      }

      // ── CENTRO (267–533): Relógio + Data ───────────────────────────
      it.strftime(W/2, 15, id(font_clock), TextAlign::TOP_CENTER, "%H:%M", now);

      const char* dias[]  = {"Dom","Seg","Ter","Qua","Qui","Sex","Sab"};
      const char* meses[] = {"jan","fev","mar","abr","mai","jun",
                              "jul","ago","set","out","nov","dez"};
      char data_buf[48];
      snprintf(data_buf, sizeof(data_buf), "%s, %02d de %s de %04d",
               dias[now.day_of_week - 1], now.day_of_month,
               meses[now.month - 1], now.year);
      it.printf(W/2, 108, id(font_date), TextAlign::TOP_CENTER, "%s", data_buf);

      if (id(g_rates_ok)) {
        const int RR = W - PAD;  // borda direita
        const int IC = 590;      // coluna dos ícones
        const int RS = 46;       // espaço entre linhas
        int ry = 10;
        char buf[32];

        // helper: formata inteiro com separador de milhar pt-BR (ponto)
        auto fmt_th = [](char* b, size_t s, long v) {
          if (v >= 1000000L)
            snprintf(b, s, "%ld.%03ld.%03ld", v/1000000L, (v/1000L)%1000L, v%1000L);
          else if (v >= 1000L)
            snprintf(b, s, "%ld.%03ld", v/1000L, v%1000L);
          else
            snprintf(b, s, "%ld", v);
        };

        // USD/BRL  — ícone + valor com decimais (ex: 5,87)
        it.printf(IC, ry, id(font_currency_icon), TextAlign::TOP_LEFT, "\U000F01C1");
        long usd_i = (long)id(g_usd_brl);
        int  usd_d = (int)((id(g_usd_brl) - (float)usd_i) * 100.0f + 0.5f);
        if (usd_d >= 100) { usd_i++; usd_d = 0; }
        snprintf(buf, sizeof(buf), "%ld,%02d", usd_i, usd_d);
        it.printf(RR, ry, id(font_rates_small), TextAlign::TOP_RIGHT, "%s", buf);

        // BTC em USD — ícone + valor inteiro com milhar (ex: 105.230)
        ry += RS;
        it.printf(IC, ry, id(font_currency_icon), TextAlign::TOP_LEFT, "\U000F0813");
        float btc_usd = id(g_btc_brl) / id(g_usd_brl);
        fmt_th(buf, sizeof(buf), (long)(btc_usd + 0.5f));
        it.printf(RR, ry, id(font_rates_small), TextAlign::TOP_RIGHT, "%s", buf);

        // BTC em BRL — ícone moeda BRL + valor inteiro com milhar (ex: 597.305)
        ry += RS;
        it.printf(IC, ry, id(font_currency_icon), TextAlign::TOP_LEFT, "\U000F0B85");
        fmt_th(buf, sizeof(buf), (long)(id(g_btc_brl) + 0.5f));
        it.printf(RR, ry, id(font_rates_small), TextAlign::TOP_RIGHT, "%s", buf);
      }

      it.line(0, 155, W, 155);

      // ══════════════════════════════════════════════════════════════════
      // ESQUERDA: CALENDÁRIO do mês
      // ══════════════════════════════════════════════════════════════════
      const int CAL_X = 65;   // centralizado em coluna de 430px: (430-350)/2 + 25
      const int CAL_CENTER = 215;
      const int CAL_Y = 180;
      const int DAY_SIZE = 50;
      const int DAY_SPACING = 50;

      // Dias da semana (Dom-Sab)
      const char* weekdays[] = {"Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sab"};
      int wx = CAL_X;
      for (int i = 0; i < 7; i++) {
        it.printf(wx, CAL_Y, id(font_small), TextAlign::TOP_CENTER, "%s", weekdays[i]);
        wx += DAY_SPACING;
      }

      // Calcular dias do mês
      int days_in_month[] = {0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31};
      int month_days = days_in_month[now.month];
      if (now.month == 2 && ((now.year % 4 == 0 && now.year % 100 != 0) || (now.year % 400 == 0)))
        month_days = 29;

      // Calcular primeiro dia da semana do mês
      struct tm timeinfo = {};
      timeinfo.tm_year = now.year - 1900;
      timeinfo.tm_mon = now.month - 1;
      timeinfo.tm_mday = 1;
      mktime(&timeinfo);
      int first_dow = timeinfo.tm_wday;

      // Desenhar dias do mês
      int day = 1;
      int x_pos = CAL_X + (first_dow * DAY_SPACING);
      int y_pos = CAL_Y + 45;

      for (int d = 1; d <= month_days; d++) {
        if (x_pos > CAL_X + (6 * DAY_SPACING)) {
          x_pos = CAL_X;
          y_pos += 55;
        }

        if (d == now.day_of_month) {
          it.filled_rectangle(x_pos - 18, y_pos - 18, 36, 40);
          it.printf(x_pos, y_pos, id(font_calendar_day), Color(0, 0, 0), TextAlign::CENTER, "%d", d);
        } else {
          it.printf(x_pos, y_pos, id(font_calendar_day), TextAlign::CENTER, "%d", d);
        }

        x_pos += DAY_SPACING;
      }

      // ══════════════════════════════════════════════════════════════════
      // DIREITA: CLIMA
      // ══════════════════════════════════════════════════════════════════
      const int RX = 450;
      const int RY = 165;

      auto wmo_icon = [](int code) -> const char* {
        if (code <= 1)                return "\U000F0599"; // sunny
        if (code == 2)                return "\U000F0595"; // partly cloudy
        if (code == 3)                return "\U000F0590"; // cloudy
        if (code == 45 || code == 48) return "\U000F0591"; // fog
        if (code >= 51 && code <= 57) return "\U000F0597"; // drizzle
        if (code >= 61 && code <= 67) return "\U000F0596"; // rain
        if (code >= 71 && code <= 77) return "\U000F0598"; // snow
        if (code >= 80 && code <= 82) return "\U000F0596"; // showers
        if (code >= 85 && code <= 86) return "\U000F067F"; // snow showers
        if (code >= 95)               return "\U000F067E"; // thunderstorm
        return "\U000F0590";
      };

      auto wmo_desc = [](int code) -> const char* {
        if (code == 0)                return "Ceu limpo";
        if (code == 1)                return "Principalmente limpo";
        if (code == 2)                return "Parcialmente nublado";
        if (code == 3)                return "Encoberto";
        if (code == 45 || code == 48) return "Neblina";
        if (code >= 51 && code <= 57) return "Garoa";
        if (code >= 61 && code <= 67) return "Chuva";
        if (code >= 71 && code <= 77) return "Neve";
        if (code >= 80 && code <= 82) return "Aguaceiro";
        if (code >= 85 && code <= 86) return "Neve leve";
        if (code >= 95)               return "Trovoada";
        return "Nublado";
      };

      it.line(430, 155, 430, H);

      if (id(g_weather_ok)) {
        it.printf(RX, RY, id(font_weather_icon), TextAlign::TOP_LEFT,
                  "%s", wmo_icon(id(g_weather_code)));
        char buf_temp[16];
        snprintf(buf_temp, sizeof(buf_temp), "%.0f°C", id(g_temp));
        it.printf(RX + 82, RY + 15, id(font_rates_big), TextAlign::TOP_LEFT, "%s", buf_temp);
        it.printf(RX, RY + 82, id(font_body), TextAlign::TOP_LEFT,
                  "%s - %d%% umid.", wmo_desc(id(g_weather_code)), id(g_humidity));
      } else {
        it.printf(RX, RY + 20, id(font_body), TextAlign::TOP_LEFT, "Buscando clima...");
      }

      // Previsão 5 dias
      if (id(g_fc_ok)) {
        it.line(430, 278, 800, 278);

        const char* wd3[] = {"Dom","Seg","Ter","Qua","Qui","Sex","Sab"};
        int today_dow = now.day_of_week - 1;  // 0=Dom

        const int FC_Y  = 288;
        const int COL_W = 74;  // (800-430)/5

        for (int i = 0; i < 5; i++) {
          int cx  = 430 + COL_W * i + COL_W / 2;
          int dow = (today_dow + i + 1) % 7;
          char fc_buf[10];

          it.printf(cx, FC_Y,      id(font_calendar_label), TextAlign::TOP_CENTER, "%s", wd3[dow]);
          it.printf(cx, FC_Y + 22, id(font_weather_icon_small), TextAlign::TOP_CENTER,
                    "%s", wmo_icon(id(g_fc_code)[i]));
          snprintf(fc_buf, sizeof(fc_buf), "%.0f°", id(g_fc_tmax)[i]);
          it.printf(cx, FC_Y + 62, id(font_body), TextAlign::TOP_CENTER, "%s", fc_buf);
          snprintf(fc_buf, sizeof(fc_buf), "%.0f°", id(g_fc_tmin)[i]);
          it.printf(cx, FC_Y + 87, id(font_small), TextAlign::TOP_CENTER, "%s", fc_buf);
        }
      }

      // ══════════════════════════════════════════════════════════════════
      // RODAPÉ: Última atualização
      // ══════════════════════════════════════════════════════════════════
      if (id(g_upd_h) >= 0) {
        it.printf(W - PAD, H - 15, id(font_small), TextAlign::BOTTOM_RIGHT,
                  "atualizado às %02d:%02d", id(g_upd_h), id(g_upd_m));
      }
