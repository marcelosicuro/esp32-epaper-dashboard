substitutions:
  device_name: painel-pessoal
  friendly_name: "Painel Pessoal"

  # --- Localização (Open-Meteo — grátis, sem API key) ---
  latitude:  "-23.5505"
  longitude: "-46.6333"
  timezone:  "America/Sao_Paulo"

  # --- Pinos (Waveshare 7.5" V2 + ESP32-C3) ---
  spi_clk:     GPIO6
  spi_mosi:    GPIO7
  epaper_cs:   GPIO2
  epaper_dc:   GPIO4
  epaper_rst:  GPIO5
  epaper_busy: GPIO3

  # --- Integrações opcionais ---
  # Deixe vazio ("") para desabilitar; configure em secrets.yaml
  todoist_token: ""          # ou: !secret todoist_token
  companion_url: ""          # ou: !secret companion_url  ex: http://192.168.1.10:8765

# ---------------------------------------------------------------------------
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - delay: 12s
      - script.execute: fetch_all

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# ---------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Painel Setup"
    password: !secret ap_password

captive_portal:
logger:

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

api:
  encryption:
    key: !secret api_key

# ---------------------------------------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    servers:
      - pool.ntp.org
      - 1.br.pool.ntp.org
    on_time_sync:
      then:
        - component.update: epaper_display
    on_time:
      # Atualiza o relógio a cada minuto
      - seconds: 0
        then:
          - component.update: epaper_display
      # Busca todos os dados a cada 20 minutos
      - seconds: 0
        minutes: /20
        then:
          - script.execute: fetch_all

# ---------------------------------------------------------------------------
http_request:
  useragent: esphome/painel-pessoal
  timeout: 15s

# ---------------------------------------------------------------------------
globals:
  # Clima atual
  - id: g_temp
    type: float
    restore_value: false
    initial_value: '-99.0'
  - id: g_feels_like
    type: float
    restore_value: false
    initial_value: '-99.0'
  - id: g_humidity
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_wind_kmh
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_weather_code
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_weather_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Previsão 3 dias (índice 1=amanhã, 2=depois, 3=mais um)
  - id: g_fc_code_0
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_0
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_0
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_1
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_1
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_1
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_code_2
    type: int
    restore_value: false
    initial_value: '0'
  - id: g_fc_max_2
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_fc_min_2
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_forecast_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Tarefas (até 3)
  - id: g_task_0
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: g_task_1
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: g_task_2
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: g_task_count
    type: int
    restore_value: false
    initial_value: '0'

  # E-mail
  - id: g_email_unread
    type: int
    restore_value: false
    initial_value: '-1'

  # Cotações
  - id: g_usd_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_btc_brl
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: g_rates_ok
    type: bool
    restore_value: false
    initial_value: 'false'

  # Horário da última atualização
  - id: g_upd_h
    type: int
    restore_value: false
    initial_value: '-1'
  - id: g_upd_m
    type: int
    restore_value: false
    initial_value: '-1'

# ---------------------------------------------------------------------------
script:
  # Orquestra todas as buscas em sequência para poupar RAM
  - id: fetch_all
    mode: single
    then:
      - script.execute: fetch_weather
      - script.wait:   fetch_weather
      - script.execute: fetch_rates
      - script.wait:   fetch_rates
      - script.execute: fetch_tasks
      - script.wait:   fetch_tasks
      - script.execute: fetch_companion
      - script.wait:   fetch_companion
      - component.update: epaper_display

  # ── Clima + Previsão (Open-Meteo) ──────────────────────────────────────
  - id: fetch_weather
    mode: single
    then:
      - http_request.get:
          url: !lambda |-
            return "https://api.open-meteo.com/v1/forecast"
                   "?latitude=${latitude}&longitude=${longitude}"
                   "&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m"
                   "&daily=weather_code,temperature_2m_max,temperature_2m_min"
                   "&wind_speed_unit=kmh&timezone=auto&forecast_days=4";
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto cur = root["current"];
                    if (!cur.isNull()) {
                      id(g_temp)         = cur["temperature_2m"].as<float>();
                      id(g_feels_like)   = cur["apparent_temperature"].as<float>();
                      id(g_humidity)     = cur["relative_humidity_2m"].as<int>();
                      id(g_wind_kmh)     = cur["wind_speed_10m"].as<float>();
                      id(g_weather_code) = cur["weather_code"].as<int>();
                      id(g_weather_ok)   = true;
                      auto t = id(sntp_time).now();
                      id(g_upd_h) = t.hour; id(g_upd_m) = t.minute;
                    }
                    auto daily = root["daily"];
                    if (!daily.isNull()) {
                      auto codes = daily["weather_code"].as<JsonArray>();
                      auto maxs  = daily["temperature_2m_max"].as<JsonArray>();
                      auto mins  = daily["temperature_2m_min"].as<JsonArray>();
                      // índice 0 = hoje, 1-3 = próximos dias
                      id(g_fc_code_0) = codes[1].as<int>(); id(g_fc_max_0) = maxs[1].as<float>(); id(g_fc_min_0) = mins[1].as<float>();
                      id(g_fc_code_1) = codes[2].as<int>(); id(g_fc_max_1) = maxs[2].as<float>(); id(g_fc_min_1) = mins[2].as<float>();
                      id(g_fc_code_2) = codes[3].as<int>(); id(g_fc_max_2) = maxs[3].as<float>(); id(g_fc_min_2) = mins[3].as<float>();
                      id(g_forecast_ok) = true;
                    }
                    return true;
                  });

  # ── Cotações (AwesomeAPI — sem chave) ──────────────────────────────────
  - id: fetch_rates
    mode: single
    then:
      - http_request.get:
          url: "https://economia.awesomeapi.com.br/last/USD-BRL,BTC-BRL"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    auto usd = root["USDBRL"];
                    auto btc = root["BTCBRL"];
                    if (!usd.isNull()) id(g_usd_brl) = atof(usd["bid"].as<const char*>());
                    if (!btc.isNull()) id(g_btc_brl) = atof(btc["bid"].as<const char*>());
                    id(g_rates_ok) = true;
                    return true;
                  });

  # ── Tarefas (Todoist — opcional) ───────────────────────────────────────
  - id: fetch_tasks
    mode: single
    then:
      - lambda: |-
          // Pula se token não configurado
          if (strlen("${todoist_token}") == 0) return;
      - http_request.get:
          url: "https://api.todoist.com/rest/v2/tasks?filter=today%7Coverdue"
          headers:
            Authorization: !lambda return std::string("Bearer ${todoist_token}");
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  id(g_task_0) = ""; id(g_task_1) = ""; id(g_task_2) = "";
                  id(g_task_count) = 0;
                  json::parse_json(body, [](JsonArray arr) -> bool {
                    for (auto task : arr) {
                      std::string name = task["content"].as<std::string>();
                      if (name.length() > 36) name = name.substr(0, 33) + "...";
                      if      (id(g_task_count) == 0) id(g_task_0) = name;
                      else if (id(g_task_count) == 1) id(g_task_1) = name;
                      else if (id(g_task_count) == 2) id(g_task_2) = name;
                      else break;
                      id(g_task_count)++;
                    }
                    return true;
                  });

  # ── Companion (Apple Reminders + E-mail — opcional) ───────────────────
  - id: fetch_companion
    mode: single
    then:
      - lambda: |-
          if (strlen("${companion_url}") == 0) return;
      - http_request.get:
          url: !lambda return std::string("${companion_url}") + "/data.json";
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  id(g_task_0) = ""; id(g_task_1) = ""; id(g_task_2) = "";
                  id(g_task_count) = 0;
                  json::parse_json(body, [](JsonObject root) -> bool {
                    id(g_email_unread) = root["email_unread"] | -1;
                    auto tasks = root["tasks"].as<JsonArray>();
                    for (auto t : tasks) {
                      std::string name = t.as<std::string>();
                      if (name.length() > 36) name = name.substr(0, 33) + "...";
                      if      (id(g_task_count) == 0) id(g_task_0) = name;
                      else if (id(g_task_count) == 1) id(g_task_1) = name;
                      else if (id(g_task_count) == 2) id(g_task_2) = name;
                      else break;
                      id(g_task_count)++;
                    }
                    return true;
                  });

# ---------------------------------------------------------------------------
font:
  - file: "fonts/Roboto-Bold.ttf"
    id: font_clock
    size: 78
    glyphs: "0123456789:"

  - file: "fonts/Roboto-Bold.ttf"
    id: font_temp
    size: 50
    glyphs: "0123456789.,-°C"

  - file: "fonts/Roboto-Regular.ttf"
    id: font_body
    size: 22
    glyphs: &pt >-
      ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
      0123456789 .,:/°-%$€₿çãõáéíóúâêîôûàèìòùäëïöü-_()

  - file: "fonts/Roboto-Bold.ttf"
    id: font_body_bold
    size: 22
    glyphs: *pt

  - file: "fonts/Roboto-Regular.ttf"
    id: font_small
    size: 18
    glyphs: *pt

  - file: "fonts/Roboto-Light.ttf"
    id: font_date
    size: 26
    glyphs: *pt

# ---------------------------------------------------------------------------
spi:
  clk_pin:  ${spi_clk}
  mosi_pin: ${spi_mosi}

# ---------------------------------------------------------------------------
display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin:    ${epaper_cs}
    dc_pin:    ${epaper_dc}
    busy_pin:  ${epaper_busy}
    reset_pin: ${epaper_rst}
    model: 7.50inV2
    update_interval: never   # controlado pelos scripts acima
    rotation: 0°
    lambda: |-
      // ── Helpers ──────────────────────────────────────────────────────
      const int W = 800, H = 480, PAD = 22;
      const int DIVX = 385;   // divisória vertical esquerda|direita
      const int DIV1 = 315;   // divisória horizontal clima|tarefas
      const int DIV2 = 435;   // divisória horizontal tarefas|rodapé

      auto wmo_pt = [](int c) -> const char* {
        if (c == 0)                return "Céu limpo";
        if (c <= 3)                return "Nublado";
        if (c == 45 || c == 48)   return "Nevoeiro";
        if (c >= 51 && c <= 55)   return "Garoa";
        if (c >= 61 && c <= 65)   return "Chuva";
        if (c >= 71 && c <= 77)   return "Neve";
        if (c >= 80 && c <= 82)   return "Pancadas";
        if (c == 95)              return "Tempestade";
        if (c == 96 || c == 99)   return "Granizo";
        return "—";
      };

      auto wmo_icon = [](int c) -> const char* {
        if (c == 0)              return "[sol]";
        if (c <= 2)              return "[sol/nuvem]";
        if (c == 3)              return "[nublado]";
        if (c >= 51 && c <= 67) return "[chuva]";
        if (c >= 71 && c <= 77) return "[neve]";
        if (c >= 80)             return "[tempestade]";
        return "[nuvem]";
      };

      auto now = id(sntp_time).now();
      if (!now.is_valid()) {
        it.printf(W/2, H/2, id(font_body), TextAlign::CENTER, "Aguardando NTP...");
        return;
      }

      // ── ESQUERDA: Relógio + Data ──────────────────────────────────────
      it.strftime(PAD, 30, id(font_clock), TextAlign::TOP_LEFT, "%H:%M", now);

      const char* dias[]  = {"Dom","Seg","Ter","Qua","Qui","Sex","Sáb"};
      const char* meses[] = {"jan","fev","mar","abr","mai","jun",
                              "jul","ago","set","out","nov","dez"};
      char data_buf[48];
      snprintf(data_buf, sizeof(data_buf), "%s, %02d de %s de %04d",
               dias[now.day_of_week], now.day_of_month,
               meses[now.month - 1], now.year);
      it.printf(PAD, 128, id(font_date), TextAlign::TOP_LEFT, "%s", data_buf);

      // ── Linha divisória vertical ──────────────────────────────────────
      it.line(DIVX, 0, DIVX, DIV1);

      // ── DIREITA-TOPO: Clima atual ─────────────────────────────────────
      const int RX = DIVX + PAD;
      const int RW = W - PAD;

      if (!id(g_weather_ok)) {
        it.printf(RX, 80, id(font_body), TextAlign::TOP_LEFT, "Buscando clima...");
      } else {
        it.printf(RX, PAD, id(font_body), TextAlign::TOP_LEFT,
                  "%s", wmo_pt(id(g_weather_code)));
        it.printf(RX, 55, id(font_temp), TextAlign::TOP_LEFT,
                  "%.1f°C", id(g_temp));

        const int DY = 115, DS = 34, COL2 = RX + 175;
        it.printf(RX,   DY,      id(font_body), TextAlign::TOP_LEFT, "Sensação");
        it.printf(COL2, DY,      id(font_body), TextAlign::TOP_LEFT, "%.1f°C", id(g_feels_like));
        it.printf(RX,   DY+DS,   id(font_body), TextAlign::TOP_LEFT, "Umidade");
        it.printf(COL2, DY+DS,   id(font_body), TextAlign::TOP_LEFT, "%d%%", id(g_humidity));
        it.printf(RX,   DY+DS*2, id(font_body), TextAlign::TOP_LEFT, "Vento");
        it.printf(COL2, DY+DS*2, id(font_body), TextAlign::TOP_LEFT, "%.0f km/h", id(g_wind_kmh));
      }

      // ── DIREITA-BAIXO: Previsão 3 dias ───────────────────────────────
      it.line(DIVX, 235, W, 235);

      if (id(g_forecast_ok)) {
        const char* label_dias[] = {"Amanhã", "Em 2 dias", "Em 3 dias"};
        int codes[] = {id(g_fc_code_0), id(g_fc_code_1), id(g_fc_code_2)};
        float maxs[] = {id(g_fc_max_0), id(g_fc_max_1), id(g_fc_max_2)};
        float mins[] = {id(g_fc_min_0), id(g_fc_min_1), id(g_fc_min_2)};

        int fy = 245;
        for (int i = 0; i < 3; i++) {
          it.printf(RX,        fy + i*24, id(font_small), TextAlign::TOP_LEFT,
                    "%-9s", label_dias[i]);
          it.printf(RX + 105,  fy + i*24, id(font_small), TextAlign::TOP_LEFT,
                    "%s", wmo_pt(codes[i]));
          it.printf(RW - 80,   fy + i*24, id(font_small), TextAlign::TOP_RIGHT,
                    "%.0f / %.0f°C", maxs[i], mins[i]);
        }
      }

      // ── Linha divisória horizontal (clima | tarefas) ─────────────────
      it.line(0, DIV1, W, DIV1);

      // ── TAREFAS ───────────────────────────────────────────────────────
      it.printf(PAD, DIV1 + 8, id(font_body_bold), TextAlign::TOP_LEFT, "TAREFAS");

      if (id(g_task_count) == 0) {
        it.printf(PAD, DIV1 + 36, id(font_body), TextAlign::TOP_LEFT,
                  strlen("${todoist_token}") == 0 && strlen("${companion_url}") == 0
                    ? "Configure Todoist ou Companion no secrets.yaml"
                    : "Nenhuma tarefa para hoje");
      } else {
        std::string* tasks[] = {&id(g_task_0), &id(g_task_1), &id(g_task_2)};
        for (int i = 0; i < id(g_task_count) && i < 3; i++) {
          it.printf(PAD, DIV1 + 36 + i * 28, id(font_body), TextAlign::TOP_LEFT,
                    "▢  %s", tasks[i]->c_str());
        }
      }

      // ── Linha divisória horizontal (tarefas | rodapé) ────────────────
      it.line(0, DIV2, W, DIV2);

      // ── RODAPÉ ────────────────────────────────────────────────────────
      int ry = DIV2 + 8;

      // E-mail
      if (id(g_email_unread) >= 0) {
        it.printf(PAD, ry, id(font_small), TextAlign::TOP_LEFT,
                  "✉ %d não lido%s",
                  id(g_email_unread), id(g_email_unread) == 1 ? "" : "s");
      }

      // Cotações
      if (id(g_rates_ok)) {
        char rates_buf[64];
        if (id(g_btc_brl) >= 1000)
          snprintf(rates_buf, sizeof(rates_buf), "$ %.2f  ₿ %.0f", id(g_usd_brl), id(g_btc_brl));
        else
          snprintf(rates_buf, sizeof(rates_buf), "$ %.2f", id(g_usd_brl));
        it.printf(W/2, ry, id(font_small), TextAlign::TOP_CENTER, "%s", rates_buf);
      }

      // Última atualização
      if (id(g_upd_h) >= 0) {
        it.printf(W - PAD, ry, id(font_small), TextAlign::TOP_RIGHT,
                  "atualizado às %02d:%02d", id(g_upd_h), id(g_upd_m));
      }
